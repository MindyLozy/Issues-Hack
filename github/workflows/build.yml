name: Build Mod DLL

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Позволяет запускать сборку вручную

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x' # Судя по путям MelonLoader, нужен .NET 6

    - name: Restore dependencies
      run: dotnet restore IssuesHack.csproj

    - name: Build
      run: dotnet build IssuesHack.csproj --configuration Release --no-restore

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GrannyMod-DLL
        path: bin/Release/net6.0/*.dll
